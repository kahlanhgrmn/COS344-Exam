les, making it correct for technical drawings where measurements from the image should be accurate."}, {"q": "In the view transform, the \"true up\" vector u is computed as u = r × f (not using the world up directly). Why?", "opts": ["The world up vector is always (0,1,0)", "To ensure u is orthogonal to both r and f — the world up may not be perpendicular to f", "To invert the camera orientation", "The world up vector is undefined in view space"], "answer": "B", "explanation": "The user-provided up vector is a hint; re-computing u = r × f ensures a truly orthogonal camera basis (the provided up may be slightly off-axis)."}, {"q": "A perspective view frustum is shaped like:", "opts": ["A rectangular box", "A truncated pyramid (frustum) with apex at the camera", "A sphere centred at the near plane", "An infinite cone"], "answer": "B", "explanation": "The perspective view volume is a truncated pyramid: wide at the far plane, narrower at the near plane, with its theoretical apex at the camera position."}, {"q": "After perspective projection and viewport transform, vertex (0,0,−5) (on the z-axis, 5 units in front of the camera) maps to the screen. Where does it appear?", "opts": ["Off-screen", "At the centre of the screen", "At the top-left corner", "The position depends on the object's colour"], "answer": "B", "explanation": "A point on the camera's z-axis projects to the centre of the image plane in both perspective and orthographic projection."}], "lqs": [{"id": "Q1", "q": "Explain why perspective projection causes objects to appear smaller as they move further away. Derive this from the perspective equation y_screen = (n/z) × y_eye.", "bullets": ["In perspective, the image plane is at z = −n (near plane). A point at eye-space position (x, y, z) projects to y_screen = (n / |z|) × y.", "As z increases (object moves further), n/z → 0, so y_screen → 0 — the projected height shrinks.", "This matches human perception: parallel lines (train tracks) converge to a vanishing point at infinity.", "The perspective matrix encodes this by putting z into w; the divide (y/w) = (y×n)/(z) produces the foreshortening.", "Orthographic has no z in the denominator: y_screen = y — size is preserved regardless of depth."]}, {"id": "Q2", "q": "A developer complains that their perspective scene has \"z-fighting\" (flickering between two coplanar surfaces). Explain the technical cause and propose two solutions.", "bullets": ["Z-fighting: two surfaces very close in depth get the same z-buffer value due to floating-point precision; which one \"wins\" the depth test flickers per-frame.", "Root cause: perspective projection compresses z non-linearly (1/z distribution); near-far range too large wastes precision at small z differences.", "**Solution 1**: Increase the near plane distance (e.g., from 0.01 to 0.1) — this restores precision in the region of interest; most precision loss happens when near ≈ 0.", "**Solution 2**: Use a 32-bit depth buffer instead of 16-bit, providing more discrete levels.", "**Solution 3**: Separate coplanar surfaces with a small geometry offset (polygon offset in OpenGL: glPolygonOffset).", "The root principle: narrow the near-far ratio (f/n) as much as the scene allows."]}, {"id": "Q3", "q": "Given a perspective projection with n=1, f=100, and a symmetric frustum with t=0.75, l=−1, r=1, b=−0.75, compute the perspective matrix P. State what each non-zero element does.", "bullets": ["Perspective matrix:", "n/r = 1/1 = **1.0** — scales x (controls horizontal FOV).", "n/t = 1/0.75 = **1.333** — scales y (controls vertical FOV).", "−(f+n)/(f−n) = −(101/99) ≈ **−1.02** — z remapping for NDC.", "−2fn/(f−n) = −2×100×1/99 ≈ **−2.02** — z offset for NDC.", "Row 4: (0,0,−1,0) — copies z into w for the perspective divide."]}]}, {"id": "L13", "title": "ASSIMP & Blender", "mcqs": [{"q": "What is ASSIMP?", "opts": ["A GLSL shader library", "An open-source C++ library for importing 3D model files in many formats into a unified scene structure", "A GPU driver utility for AMD cards", "A physics simulation library"], "answer": "B", "explanation": "ASSIMP (Open Asset Import Library) reads 3D file formats (OBJ, FBX, COLLADA, etc.) and provides a unified C++ API (aiScene, aiMesh, aiNode) for accessing geometry."}, {"q": "In ASSIMP's data structure, an aiMesh contains:", "opts": ["Only the file path to the mesh", "Vertex positions, normals, UV coordinates, and face indices", "Shader source code", "Animation keyframe data only"], "answer": "B", "explanation": "An aiMesh holds the raw geometry: vertex arrays (positions, normals, texture coordinates) and index arrays defining faces."}, {"q": "Blender is described as a:", "opts": ["Standalone game engine", "Free and open-source 3D creation suite for modelling, rigging, animation, and rendering", "A compiled C++ OpenGL framework", "A texture compression tool"], "answer": "B", "explanation": "Blender is a comprehensive 3D tool supporting modelling, UV unwrapping, rigging, animation, and rendering (Cycles/EEVEE)."}, {"q": "When exporting a Blender model to OBJ for use in an OpenGL application, what must the developer check?", "opts": ["The model's polygon count must be exactly 1000", "The export settings (triangulation, coordinate system, UV export, normals) match what the importer/application expects", "The model must be painted with Blender's vertex paint tool", "The model must be animated before export"], "answer": "B", "explanation": "OBJ export settings: triangulate faces (OpenGL needs triangles), apply transforms, correct coordinate convention (Y-up vs Z-up), and ensure UV + normal export."}, {"q": "In a 3D model file, what is a \"mesh\"?", "opts": ["The shader program used for rendering", "A collection of vertices, edges, and faces defining a 3D shape's geometry", "A scene graph node", "A texture image"], "answer": "B", "explanation": "A mesh is the geometric representation: vertices connected by edges forming polygonal faces."}, {"q": "Why does a loaded 3D model need to have its geometry uploaded to VBOs before rendering in OpenGL?", "opts": ["OpenGL cannot access CPU memory; geometry must be in GPU memory (VRAM) to be rendered", "VBOs compress the geometry", "ASSIMP cannot load geometry directly to the GPU", "VBOs apply transformations to the geometry"], "answer": "A", "explanation": "The GPU vertex shader operates on data in GPU memory (VRAM); raw CPU arrays must be copied to VBOs via glBufferData before rendering."}, {"q": "What is UV unwrapping in Blender?", "opts": ["Removing the UV channel from a model", "Projecting the 3D surface of a model to a 2D flat plane to define texture coordinate mapping", "Creating a skeleton rig for animation", "Subdividing the mesh for higher resolution"], "answer": "B", "explanation": "UV unwrapping \"unfolds\" the 3D mesh surface onto a 2D UV map, assigning each vertex a (u,v) coordinate for texture sampling."}, {"q": "The ASSIMP scene structure is organised as:", "opts": ["A flat array of all meshes", "A tree of aiNode objects, where each node may reference meshes and has a transformation matrix", "A linked list of materials", "A hash map from mesh name to geometry"], "answer": "B", "explanation": "ASSIMP mirrors the source file's hierarchy: a tree of nodes, each with a local transform and pointers to the meshes it instances."}, {"q": "When loading a textured model with ASSIMP, textures are typically:", "opts": ["Embedded directly in the aiMesh object", "Referenced by filename in aiMaterial; the application must separately load the image file and create an OpenGL texture", "Automatically bound to texture unit 0 by ASSIMP", "Converted to procedural shaders"], "answer": "B", "explanation": "ASSIMP stores texture file paths in the material; the developer uses a library like stb_image to load the actual image data and calls glTexImage2D to create the OpenGL texture."}, {"q": "A loaded mesh has indices [0,1,2, 0,2,3] and vertices [(0,0), (1,0), (1,1), (0,1)]. How many triangles does this mesh have?", "opts": ["4", "3", "2", "6"], "answer": "C", "explanation": "The index array defines two triangles: (0,1,2) and (0,2,3) — a quad divided into 2 triangles."}], "lqs": [{"id": "Q1", "q": "Describe the workflow from creating a 3D model in Blender to rendering it in an OpenGL application using ASSIMP. List each major step and what data is transferred at each stage.", "bullets": ["**Blender**: create geometry, unwrap UVs, assign materials with texture paths, rig and animate if needed.", "**Export**: export as OBJ/FBX/GLTF with triangulation, normals, UV coordinates, and correct axis conventions.", "**ASSIMP load**: `Assimp::Importer importer; const aiScene* scene = importer.ReadFile(path, aiProcess_Triangulate | aiProcess_GenNormals)`.", "**Data extraction**: traverse aiNode tree; for each aiMesh extract vertices (positions, normals, UVs) and face indices into CPU arrays.", "**GPU upload**: call glGenBuffers, glBindBuffer, glBufferData to upload vertex data to VBO; set up VAO attribute pointers; upload indices to EBO.", "**Texture**: load image with stb_image; upload with glTexImage2D; set wrap/filter modes.", "**Render loop**: bind VAO, bind textures, set uniforms (MVP), call glDrawElements."]}, {"id": "Q2", "q": "A developer loads a character model in ASSIMP and finds that the character appears sideways (lying on its side). Diagnose the cause and describe the fix.", "bullets": ["Most likely cause: coordinate system mismatch. Blender uses Z-up (Z is the vertical axis); OpenGL and many applications expect Y-up.", "During OBJ/FBX export from Blender, the export setting \"Apply Transform\" or \"Coordinate Axis\" must convert to Y-up — if this was not done, the Z-axis becomes the Y-axis in the imported model.", "Fix 1: Re-export from Blender with the correct coordinate system setting (Y Forward, Z Up → Y Up convention).", "Fix 2: Apply a corrective rotation matrix in the application's model matrix: Rx(−90°) rotates Z-up to Y-up.", "Fix 3: Use the ASSIMP post-processing flag `aiProcess_MakeLeftHanded` or a coordinate transform."]}, {"id": "Q3", "q": "A model file contains a quad (4 vertices forming a square). Provide the vertex positions and index buffer (as two triangles) for a unit square, and explain why OpenGL requires triangles rather than quads.", "bullets": ["Vertex positions (unit square): v0=(0,0,0), v1=(1,0,0), v2=(1,1,0), v3=(0,1,0).", "Index buffer (two triangles): [0,1,2, 0,2,3].", "Triangle 1: v0, v1, v2 (bottom-right triangle).", "Triangle 2: v0, v2, v3 (top-left triangle).", "Why triangles: a triangle is always planar (3 points define a unique plane); a quad can be non-planar (warped), creating ambiguity in how to rasterise it.", "GPU hardware is optimised for triangle rasterisation; the barycentric interpolation for attributes is well-defined only for triangles.", "All modern GPUs operate exclusively on triangles; quads/polygons must be triangulated first (ASSIMP's `aiProcess_Triangulate` does this automatically)."]}]}, {"id": "L14", "title": "Rasterisation with Viewing (Ch9)", "mcqs": [{"q": "Why must clipping be applied before rasterisation?", "opts": ["To remove transparent geometry", "To discard geometry behind the camera or outside the view volume that would cause incorrect rasterisation", "To sort triangles by depth", "To generate mipmaps"], "answer": "B", "explanation": "Without clipping, primitives behind the camera would be rasterised with incorrect/inverted coordinates; clipping ensures only geometry within the view volume is processed."}, {"q": "Barycentric coordinates (α, β, γ) for a point P inside triangle ABC satisfy:", "opts": ["α + β + γ = 0", "α + β + γ = 1, with all values in [0,1]", "α = β = γ", "α × β × γ = 1"], "answer": "B", "explanation": "Barycentric coordinates are a weighted combination of triangle vertices summing to 1; interior points have all weights in [0,1]."}, {"q": "In the z-buffer algorithm during rasterisation, what happens when a new fragment's depth is GREATER than the current z-buffer value?", "opts": ["The new fragment overwrites the z-buffer", "The new fragment is discarded (occluded)", "Both fragments are blended", "The z-buffer is reset"], "answer": "B", "explanation": "If the new fragment is further away (greater z in a 0→1 range, or less negative in −z convention), it is behind the current closest surface and is discarded."}, {"q": "\"Perspective-correct interpolation\" is needed for texture coordinates because:", "opts": ["Linear interpolation of UVs in screen space produces visible distortion on perspective-projected surfaces", "The GPU cannot interpolate UVs without it", "It prevents texture bleeding", "It anti-aliases the texture"], "answer": "A", "explanation": "Linear interpolation in screen space does not account for perspective foreshortening; perspective-correct interpolation divides by w to produce correct UV interpolation."}, {"q": "What is a \"fragment\" in the rasterisation pipeline?", "opts": ["A vertex after transformation", "A potential pixel: a screen-space sample with interpolated per-vertex attributes, awaiting the fragment shader", "A triangle subdivided for tessellation", "A texture sample"], "answer": "B", "explanation": "A fragment is the rasteriser's output: one per covered pixel/sample, carrying interpolated data (normal, UV, depth) to the fragment shader."}, {"q": "The Cohen-Sutherland algorithm is used for:", "opts": ["Rendering shadows", "Clipping line segments against the view volume", "Computing barycentric coordinates", "Generating mip levels"], "answer": "B", "explanation": "Cohen-Sutherland (and its extensions) is a classic algorithm for clipping line/triangle geometry against view frustum planes."}, {"q": "In which coordinate space does clipping most commonly occur in modern GPU pipelines?", "opts": ["World space", "Object space", "Clip space (homogeneous space, before the perspective divide)", "NDC space"], "answer": "C", "explanation": "Clipping is performed in clip space (4D homogeneous space) using the condition −w ≤ x̃ ≤ w, etc. — this avoids problems with perspective division by zero."}, {"q": "\"Occlusion culling\" differs from \"backface culling\" in that:", "opts": ["Occlusion culling removes back-facing triangles; backface culling removes hidden triangles", "Backface culling removes polygons facing away from the camera; occlusion culling removes objects entirely hidden by closer geometry", "They are identical", "Occlusion culling is only for transparent objects"], "answer": "B", "explanation": "Backface culling: checks winding order/normal direction. Occlusion culling: checks whether an object is completely hidden behind other objects."}, {"q": "A triangle has vertices at screen positions (10,10), (50,10), (30,40). Using barycentric coordinates, is the pixel at (30,20) inside the triangle?", "opts": ["No", "Yes", "On the edge", "Cannot determine"], "answer": "B", "explanation": "(30,20) is within the triangle's bounding box and a basic inspection shows it is inside the triangular region; barycentric weights would all be positive and sum to 1."}, {"q": "Perspective-correct interpolation of a texture coordinate u uses:", "opts": ["u = α×u_A + β×u_B + γ×u_C", "u = (α×u_A/w_A + β×u_B/w_B + γ×u_C/w_C) / (α/w_A + β/w_B + γ/w_C)", "u = (u_A + u_B + u_C) / 3", "u = u_A × depth"], "answer": "B", "explanation": "Perspective-correct interpolation divides the linear-in-screen-space interpolation by the interpolated 1/w term to correct for perspective distortion."}], "lqs": [{"id": "Q1", "q": "Explain why perspective-correct interpolation is necessary and what visual artefact appears without it. Use texture coordinates as a concrete example.", "bullets": ["When vertices are projected to screen space, depth information is compressed non-linearly by perspective division.", "Naively interpolating texture UV coordinates linearly across screen-space triangle vertices ignores this compression.", "Result: textures appear to \"slide\" or stretch — most visible on large perspective-angled polygons (like a floor receding into the distance).", "The corridor/checkerboard floor test: without correction, tiles appear warped near the edges; with correction, they look uniform.", "Fix: interpolate u/w and v/w (and 1/w) linearly (these are linear in screen space), then at each pixel compute u = (u/w) / (1/w).", "Modern GPU hardware performs this automatically; it was a visible artefact on older software renderers (early PS1 games are a famous example)."]}, {"id": "Q2", "q": "Describe three strategies for culling geometry before it reaches the fragment shader, explaining when each is applied in the pipeline.", "bullets": ["**Frustum culling (CPU/application level)**: test object/mesh bounding volumes against the view frustum before submitting draw calls — avoids sending invisible geometry to the GPU entirely.", "**Backface culling (rasteriser)**: GPU compares triangle winding order against the camera direction; back-facing triangles are discarded before fragment shading — halves fragment load on closed meshes.", "**Occlusion culling (application/hardware)**: for objects entirely hidden by closer geometry — use hardware occlusion queries or precomputed PVS to skip draw calls; applied at draw-call submission.", "**Early-Z (hardware)**: GPU tests the z-buffer before running the fragment shader; occluded fragments never execute shading — saves fragment shader cost.", "Together these form a layered defence reducing unnecessary GPU work at progressively later pipeline stages."]}, {"id": "Q3", "q": "Triangle vertices in screen space are A=(0,0), B=(4,0), C=(2,4). Point P=(2,1). Compute the barycentric coordinates of P using the area method: α = Area(PBC)/Area(ABC), β = Area(APC)/Area(ABC), γ = Area(ABP)/Area(ABC).", "bullets": ["Area(ABC) = |(B−A)×(C−A)| / 2. (B−A) = (4,0), (C−A) = (2,4). Cross: 4×4−0×2 = 16. Area = 16/2 = **8**.", "Area(PBC): P=(2,1), B=(4,0), C=(2,4). (B−P)=(2,−1), (C−P)=(0,3). Cross: 2×3−(−1)×0 = 6. Area = 6/2 = **3**.", "Area(APC): A=(0,0), P=(2,1), C=(2,4). (P−A)=(2,1), (C−A)=(2,4). Cross: 2×4−1×2 = 6. Area = 6/2 = **3**.", "Area(ABP): A=(0,0), B=(4,0), P=(2,1). (B−A)=(4,0), (P−A)=(2,1). Cross: 4×1−0×2 = 4. Area = 4/2 = **2**.", "α = 3/8 = **0.375**, β = 3/8 = **0.375**, γ = 2/8 = **0.25**.", "Check: 0.375 + 0.375 + 0.25 = 1.0 ✓. All positive → P is inside the triangle ✓."]}]}, {"id": "L15", "title": "Texture Mapping Introduction (Ch11)", "mcqs": [{"q": "What is texture mapping in computer graphics?", "opts": ["Assigning vertex colours to a mesh", "Mapping a 2D image (texture) onto a 3D surface to add detail without adding geometry", "Projecting a 3D scene onto a 2D canvas", "Compressing mesh data for storage"], "answer": "B", "explanation": "Texture mapping applies an image to a surface, providing colour, detail, and material appearance without the cost of additional geometry."}, {"q": "What is a \"texture lookup\" (texture sample)?", "opts": ["Loading an image file from disk", "Computing the surface point's corresponding (u,v) texture coordinate and reading the colour at that location", "Generating a mipmap chain", "Binding a texture to a shader unit"], "answer": "B", "explanation": "A texture lookup maps the shading point's (u,v) coordinates to a texel location in the texture image and retrieves the stored colour."}, {"q": "The texture coordinate function ϕ : S → T maps:", "opts": ["Texture space to world space", "Surface points (x,y,z) to texture coordinates (u,v)", "UV coordinates to pixel positions", "Normal vectors to colour values"], "answer": "B", "explanation": "ϕ maps from the 3D surface S to the 2D texture domain T; it is a 3D-to-2D mapping."}, {"q": "What is \"bijectivity\" in the context of texture coordinate functions?", "opts": ["The ability to tile the texture infinitely", "A one-to-one mapping: each surface point maps to a unique texture point and vice versa", "Ensuring texture coordinates stay within [0,1]", "Matching texture and mesh resolution"], "answer": "B", "explanation": "A bijective texture mapping ensures no two surface points share a texel (no overlapping in UV space) and no texels are unused."}, {"q": "\"Seams\" in texture mapping occur when:", "opts": ["The texture resolution is too low", "Adjacent surface points that are close in 3D space map to distant UV coordinates, causing visible discontinuities", "The mesh has too many vertices", "The texture uses lossy compression"], "answer": "B", "explanation": "Seams are visible lines where the UV map was \"cut\" to unfold the surface; nearby 3D surface points may be far apart in UV space, causing a visible texture boundary."}, {"q": "Cylindrical texture coordinate mapping is most appropriate for:", "opts": ["A sphere", "A flat plane", "A tall column or cylindrical object", "A face/head model"], "answer": "C", "explanation": "Cylindrical coordinates (using azimuth angle and height) wrap naturally around columnar shapes."}, {"q": "What happens when a UV coordinate exceeds [0,1] with a \"wrap\" (repeat) mode?", "opts": ["The texture coordinate is clamped to the boundary", "The texture tiles — the fractional part of the coordinate is used, repeating the texture", "A default colour (black) is returned", "The texture is mirrored"], "answer": "B", "explanation": "Repeat/wrap mode: the fractional part of UV (e.g., 1.7 → 0.7) is used, repeating the texture pattern."}, {"q": "\"Size distortion\" in texture mapping refers to:", "opts": ["The texture file being too large", "The scale of the texture not being approximately constant — some areas of the surface consume more or fewer texels than others", "The texture being the wrong resolution for the mesh", "The texture coordinates being outside [0,1]"], "answer": "B", "explanation": "Size distortion: if UV coordinates are stretched in some regions, those areas display compressed or stretched texture detail."}, {"q": "What is the purpose of a \"sampler2D\" uniform in GLSL?", "opts": ["It stores a colour value", "It represents a bound 2D texture object that can be sampled with the texture() function", "It stores the texture's resolution", "It is the index into the vertex buffer"], "answer": "B", "explanation": "A sampler2D uniform allows the fragment shader to sample (read texel colour) from a 2D texture bound to a specified texture unit."}, {"q": "A wooden floor uses UV coordinates (u = a×x, v = b×y). What happens if a and b are increased?", "opts": ["The texture appears larger on the floor", "The texture appears smaller (more tiled) — a smaller portion of the texture maps to the same surface area", "The texture is flipped", "The UV coordinates wrap around"], "answer": "B", "explanation": "Larger a, b means UV coordinates increase faster across the surface, mapping a compressed view of the texture — making the texture appear smaller and more tiled."}], "lqs": [{"id": "Q1", "q": "Describe the four properties desirable in a texture coordinate function (bijectivity, size distortion, shape distortion, continuity). Give an example of a real texture mapping problem where one of these properties is violated.", "bullets": ["**Bijectivity**: one-to-one mapping between surface and texture space. Violation: cube-map projection maps the top of a sphere to a single point (pole singularity) — multiple surface points share one texel.", "**Size distortion**: texture scale approximately constant across the surface. Violation: a naive sphere UV map (latitude/longitude) heavily compresses texels near the poles — the same texture area covers much less surface there.", "**Shape distortion**: small circles on texture appear as circles on the surface. Violation: wrapping a photo onto a sphere stretches faces at the edges.", "**Continuity**: nearby surface points → nearby UV coordinates. Violation: a UV seam on a character's back — the two sides of the cut are far apart in UV space, potentially causing visible lighting discontinuities.", "UV unwrapping in tools like Blender tries to minimise all four simultaneously."]}, {"id": "Q2", "q": "A game character's sword needs to have a metal texture. The artist provides a 1024×1024 texture. Describe the complete pipeline from texture file to a shaded fragment colour, including CPU and GPU steps.", "bullets": ["**CPU**: load image with stb_image (returns pixel data array); call glGenTextures, glBindTexture(GL_TEXTURE_2D), glTexImage2D to upload to GPU; call glGenerateMipmap.", "**CPU**: set UV coordinates per vertex in the sword's VBO; configure attribute pointer for the UV channel.", "**GPU vertex shader**: pass UV through as `out vec2 TexCoord` (varying).", "**Rasteriser**: interpolates UV across the triangle using barycentric (perspective-correct) interpolation.", "**GPU fragment shader**: `uniform sampler2D metalTexture;` then `vec4 texColor = texture(metalTexture, TexCoord);`.", "Combine with Phong lighting: `vec3 result = texColor.rgb * diffuse + specular;` → `FragColor = vec4(result, 1.0)`.", "The texel colour becomes the diffuse material colour (k_d) in the shading equation."]}, {"id": "Q3", "q": "A texture is mapped to a floor as u = 0.1x, v = 0.1z. The floor runs from x=0 to x=20, z=0 to z=20. Calculate the UV range covered and explain whether the texture will tile. Then compute the UV coordinate for the point (15, 0, 10).", "bullets": ["UV range: u from 0.1×0 to 0.1×20 = **0 to 2**; v from 0 to 0.1×20 = **0 to 2**.", "The UV range [0,2] exceeds [0,1] — with repeat/wrap mode, the texture tiles **2× in each direction** across the floor (4 total tiles).", "Point (15,0,10): u = 0.1×15 = **1.5**, v = 0.1×10 = **1.0**.", "With wrap mode: effective u = frac(1.5) = **0.5**, effective v = frac(1.0) = **0.0** (or 1.0 — same boundary).", "The texture lookup will sample the texel at approximately the centre-left of the texture image."]}]}, {"id": "L16", "title": "Texture Mapping Conclusion (Ch11)", "mcqs": [{"q": "What is a mipmap?", "opts": ["A special type of normal map", "A pre-generated sequence of progressively halved-resolution versions of a texture for use at different distances", "A texture compressed with lossy compression", "An environment map for reflections"], "answer": "B", "explanation": "Mipmaps (MIP = multum in parvo, \"much in little\") pre-compute the texture at 1/2, 1/4, 1/8... resolution; the GPU selects the appropriate level based on screen-space coverage."}, {"q": "Why do mipmaps reduce aliasing on distant surfaces?", "opts": ["They increase the texture resolution", "The pre-filtered lower-resolution mip levels avoid sampling a high-res texture too sparsely, which would cause Moiré patterns", "They apply anti-aliasing in screen space", "They reduce the polygon count of the mesh"], "answer": "B", "explanation": "Without mipmaps, a distant surface samples the full-resolution texture at too few points per texel (undersampling), causing flickering/Moiré; lower mip levels pre-average the texels."}, {"q": "A bump map stores:", "opts": ["Colour information for diffuse shading", "Perturbations to the surface normal to simulate small surface detail without geometry", "Displacement offsets applied to vertex positions", "Ambient occlusion values"], "answer": "B", "explanation": "A bump map (and its successor, normal map) encodes how to perturb the surface normal per-fragment, simulating the appearance of small bumps and grooves in lighting."}, {"q": "What is the key difference between a bump map and a displacement map?", "opts": ["Bump maps are 3-channel; displacement maps are 1-channel", "Bump maps perturb the normal (fake geometry); displacement maps actually offset vertex positions (real geometry)", "Displacement maps are cheaper than bump maps", "They are identical"], "answer": "B", "explanation": "Bump/normal maps are per-fragment shading tricks; displacement maps tessellate and move actual geometry, affecting silhouettes and self-shadowing."}, {"q": "A normal map stores:", "opts": ["The height of surface bumps as a greyscale image", "The perturbed surface normal at each texel, encoded as an RGB colour (XYZ → RGB)", "Specular highlight positions", "Vertex colours"], "answer": "B", "explanation": "Normal maps encode the surface normal vector (in tangent space) as RGB values: (0,0,1) → (0.5,0.5,1.0) flat blue — the characteristic blue tint of normal maps."}, {"q": "An environment map (cubemap) is used for:", "opts": ["Storing the scene's depth information", "Approximating reflections of the surrounding environment on shiny surfaces", "Applying shadows to the scene", "Storing pre-computed global illumination"], "answer": "B", "explanation": "Environment maps (cubemaps, sphere maps) store the surrounding environment and are sampled using the reflection vector to approximate specular reflections on shiny surfaces."}, {"q": "In OpenGL, calling glGenerateMipmap after glTexImage2D:", "opts": ["Deletes the base texture and replaces it with a compressed version", "Automatically generates all lower-resolution mip levels from the base texture", "Uploads the texture to a specific mip level", "Applies bilinear filtering to the texture"], "answer": "B", "explanation": "glGenerateMipmap automatically computes and stores all mip levels (level 1, 2, 3, ...) from the level 0 (base) texture."}, {"q": "Bilinear texture filtering interpolates:", "opts": ["Between two mip levels", "Among the four nearest texels surrounding the sample UV coordinate, weighted by proximity", "Along the mesh edges", "Between the diffuse and specular components"], "answer": "B", "explanation": "Bilinear filtering takes the four nearest texels (2×2 neighbourhood) and linearly interpolates in both u and v dimensions, producing smooth texture sampling."}, {"q": "Trilinear filtering extends bilinear filtering by:", "opts": ["Using three texture channels", "Also interpolating between two adjacent mip levels (bilinear within each mip + linear between mips)", "Using three passes of the GPU pipeline", "Applying an additional depth-based filter"], "answer": "B", "explanation": "Trilinear = bilinear filtering on the two closest mip levels + linear blend between them, eliminating the visible \"mip seam\" artefact."}, {"q": "A shiny metallic surface needs to reflect its surroundings. The reflection vector is computed as r = d − 2(d·n)n. What OpenGL texture technique uses r to look up the reflected environment?", "opts": ["Diffuse texture mapping", "Environment mapping (cubemap lookup using the reflection vector)", "Displacement mapping", "Shadow mapping"], "answer": "B", "explanation": "Environment mapping samples a cubemap using the reflection vector: `texture(environmentCubemap, reflectDir)` in GLSL."}], "lqs": [{"id": "Q1", "q": "Explain mipmapping. Why is it necessary, how is it generated, and what artefact does it prevent? Describe what happens at the transition between mip levels.", "bullets": ["**Problem**: a distant surface might cover just 2×2 pixels on screen but the full texture is 1024×1024 — sampling 4 points from a 1M-texel texture misses most detail, causing Moiré patterns and aliasing.", "**Mipmap solution**: pre-compute levels: level 0=1024×1024, level 1=512×512, ..., level 10=1×1. At render time, select the level whose texel size approximates the on-screen coverage.", "**Generation**: repeatedly downsample by averaging 2×2 blocks (glGenerateMipmap does this automatically).", "**Artefact prevented**: Moiré interference patterns and shimmering on distant textured surfaces.", "**Mip seam**: abrupt transition between levels produces a visible sharp boundary in the texture; trilinear filtering blends between the two nearest levels, eliminating this seam."]}, {"id": "Q2", "q": "A character model has a flat-shaded face that looks low-polygon. The artist wants to add skin pore and wrinkle detail without adding triangles. Which texture technique should they use and how does it work in the rendering pipeline?", "bullets": ["Use a **normal map** — a technique that perturbs per-fragment normals to simulate surface detail.", "The normal map stores encoded surface normals (in tangent space) as an RGB texture; flat blue (0.5,0.5,1) means \"no perturbation.\"", "In the fragment shader: sample the normal map → decode from [0,1] to [−1,1] → transform from tangent space to world/view space using the TBN matrix (Tangent, Bitangent, Normal).", "Use the perturbed normal in the Phong/PBR lighting calculation — areas with \"bumps\" encoded in the map catch light differently, visually appearing 3D.", "Advantage: effectively free in polygon count — all the detail is a shading trick. Limitation: silhouette edges still look flat (no actual geometry change)."]}, {"id": "Q3", "q": "A texture is 256×256 and a surface covers 4×4 pixels on screen. Calculate which mip level should be selected. If the surface covers 1×1 pixel instead, which level is used? (Level 0 = 256×256)", "bullets": ["Mip level selection: find the level where texture resolution ≈ screen coverage.", "Level n has resolution 256/2ⁿ × 256/2ⁿ.", "Surface covering 4×4 pixels: we want 256/2ⁿ ≈ 4 → 2ⁿ = 64 → n = **6** (4×4 mip level). Level 6 = 4×4 resolution.", "Surface covering 1×1 pixel: 256/2ⁿ ≈ 1 → 2ⁿ = 256 → n = **8** (1×1 mip level).", "Formula: LOD = log₂(256 / coverage_pixels) = log₂(256/4) = log₂(64) = 6 and log₂(256/1) = 8.", "Trilinear filtering would blend: for 4×4 coverage, blend between level 5 (8×8) and level 6 (4×4)."]}]}, {"id": "L17", "title": "Computer Graphics in Games (Ch22)", "mcqs": [{"q": "Why is real-time rendering in games fundamentally different from offline rendering?", "opts": ["Games use lower-quality models", "Games must render at interactive frame rates (30–60+ fps), requiring approximations instead of physically accurate methods", "Games cannot use shaders", "Games run on CPUs only"], "answer": "B", "explanation": "Real-time rendering has a strict time budget per frame (16–33ms at 60–30 fps), requiring optimisations and approximations that offline rendering does not need."}, {"q": "What is a \"depth prepass\"?", "opts": ["Computing depth of field blur as a post-process", "Rendering all opaque geometry into the depth buffer (no colour output) before the main render pass, so fragment shaders only run on visible surfaces", "Pre-sorting geometry back-to-front", "A second render pass that computes ambient occlusion"], "answer": "B", "explanation": "A depth prepass fills the depth buffer cheaply; the subsequent main pass uses early-z to skip fragment shading on occluded geometry."}, {"q": "Deferred rendering separates which two stages into separate passes?", "opts": ["Vertex processing and rasterisation", "Geometry pass (writing G-buffer with normals, albedo, depth) and lighting pass (computing lighting from G-buffer data)", "Shadow mapping and shadow sampling", "CPU culling and GPU culling"], "answer": "B", "explanation": "Deferred rendering: pass 1 fills a G-buffer (geometry data); pass 2 computes lighting for each screen pixel using the stored geometry — enabling many lights with O(lights × pixels) cost."}, {"q": "Level of Detail (LOD) refers to:", "opts": ["The number of texture channels used", "Using simpler mesh versions for distant objects to reduce vertex/fragment processing load", "The precision of the z-buffer", "The number of mip levels in a texture"], "answer": "B", "explanation": "LOD: as an object moves further from the camera, switch to lower-polygon mesh versions; reduces geometry processing with negligible visual impact."}, {"q": "Which platform type typically requires the lowest power budget and widest compatibility for game rendering?", "opts": ["High-end gaming PC", "Gaming console", "Browser-based / mobile", "VR headset"], "answer": "C", "explanation": "Browser-based and mobile games must run on the weakest common hardware configuration without a GPU, requiring the most conservative rendering approach."}, {"q": "Most GPUs include hierarchical depth-culling hardware. How does it interact with the depth prepass optimisation?", "opts": ["Hierarchical depth culling replaces the need for a depth prepass", "After the depth prepass fills the z-buffer, hierarchical depth culling can reject entire tiles of fragments before the fragment shader — maximising the speedup", "They work against each other and should not be used together", "Hierarchical depth culling only works with transparent objects"], "answer": "B", "explanation": "Hierarchical depth culling (Hi-Z) works best with a pre-filled depth buffer; together they eliminate most occluded fragment shader invocations."}, {"q": "Shadow maps are a rasterisation-based shadow technique. They work by:", "opts": ["Casting rays from every light source", "Rendering the scene from the light's perspective to create a depth map; during shading, test if a fragment is in shadow by comparing its light-space depth to the shadow map", "Computing shadows analytically from geometry", "Projecting shadow volumes as geometry"], "answer": "B", "explanation": "Shadow maps: render depth from light → compare each shaded fragment's depth (transformed to light space) against the stored depth; deeper = in shadow."}, {"q": "What is \"batching\" in the context of real-time rendering optimisation?", "opts": ["Grouping multiple draw calls into a single draw call by combining geometry, reducing CPU→GPU overhead", "Grouping textures into a single atlas", "Running multiple render passes simultaneously", "Reducing the number of shader programs"], "answer": "A", "explanation": "Batching reduces draw call count (each draw call has CPU overhead); combining static geometry into a single VBO allows one draw call to render many objects."}, {"q": "Which rendering technique is most appropriate for a dungeon scene with 50 dynamic torch lights?", "opts": ["Forward rendering with 50 lighting passes", "Deferred rendering, which handles many lights efficiently in the lighting pass", "Ray tracing", "Ambient-only lighting"], "answer": "B", "explanation": "Forward rendering costs O(fragments × lights); deferred costs O(pixels × lights) with geometry read once — far more efficient for many lights."}, {"q": "Why are transparent objects problematic in deferred rendering?", "opts": ["Transparency cannot be computed in the G-buffer pass (which stores single-surface data per pixel)", "Transparency is not supported by modern GPUs", "Deferred rendering cannot use z-buffers", "Transparent objects have no normals"], "answer": "A", "explanation": "The G-buffer stores one surface per pixel; transparency requires blending multiple layers — typically handled with a separate forward pass for transparent objects."}], "lqs": [{"id": "Q1", "q": "Compare forward rendering and deferred rendering. For each, describe how lighting is computed, and state the conditions under which each is preferred.", "bullets": ["**Forward rendering**: for each object, compute the contribution of all lights per fragment in a single pass. Cost = O(objects × lights × fragments). Simple to implement; works with transparency and MSAA naturally.", "Preferred: few lights (< 10), simple scenes, mobile/browser, transparent objects.", "**Deferred rendering**: Pass 1 (geometry pass) writes surface data (normal, albedo, depth) to G-buffers. Pass 2 (lighting pass) computes all lights per screen pixel using G-buffer data. Cost = O(pixels × lights). Handles hundreds of lights efficiently.", "Preferred: many dynamic point lights (dungeon, city with street lamps), complex indoor scenes.", "Trade-offs: deferred requires large G-buffers (memory cost), no MSAA by default, and a separate forward pass for transparent objects."]}, {"id": "Q2", "q": "A mobile game is struggling with frame rate. The scene has many trees, a large terrain, and multiple characters. Describe four performance optimisations specific to graphics, with justification for each.", "bullets": ["**LOD for trees**: use high-poly meshes near the camera, switching to low-poly (< 50 triangles) at 50m+; mobile GPUs are vertex-limited with dense foliage geometry.", "**Frustum culling**: trees outside the camera frustum are never submitted — large outdoor scenes often have < 20% of trees visible; massive draw call reduction.", "**Texture atlases**: combine multiple small textures (leaves, bark, grass) into one texture atlas — reduces texture bind state changes and draw calls.", "**Reduced shader complexity**: mobile fragment shaders should avoid per-pixel lighting for distant objects; use vertex shading (Gouraud) for far terrain.", "**Instanced rendering**: the same tree mesh drawn at many positions using a single instanced draw call — avoids per-instance CPU draw call overhead."]}, {"id": "Q3", "q": "A shadow map is rendered at 1024×1024. The scene is lit by a directional sun light casting shadows over a 100m×100m terrain. Calculate the shadow map texel density (texels per metre). If the terrain covers 2000×2000 texels of the shadow map, what problem arises and how is it addressed?", "bullets": ["Shadow map covers 100×100m at 1024×1024 texels.", "Density = 1024 / 100 = **10.24 texels/metre**.", "Problem: a 2000×2000m area would require 2000 × (1024/100) ≈ 20,480 texels in one dimension — exceeding the 1024 shadow map by 20×. Result: **shadow aliasing** (blocky shadows, each texel covers 2m).", "Solution 1: **Cascaded Shadow Maps (CSM)** — use multiple shadow maps for near/mid/far ranges; near cascade is small area (high density), far cascade covers the full terrain (lower density).", "Solution 2: **Percentage Closer Filtering (PCF)** — sample multiple neighbouring shadow map texels and average, producing soft shadow edges (less visible aliasing).", "Solution 3: **Perspective shadow maps** — warp the shadow map to concentrate texels where the camera sees close to the viewer."]}]}, {"id": "L18", "title": "Visualisation (Ch23)", "mcqs": [{"q": "Scientific visualisation is primarily concerned with:", "opts": ["Rendering photorealistic game graphics", "Representing and communicating abstract or scientific data through visual means", "Compressing 3D models for web delivery", "Animating cartoon characters"], "answer": "B", "explanation": "Scientific visualisation transforms data (medical scans, simulations, measurements) into visual representations to aid understanding and analysis."}, {"q": "A \"scalar field\" in visualisation is:", "opts": ["A set of 3D triangle meshes", "A function that assigns a single scalar value to each point in space (e.g., temperature, pressure, density)", "A vector quantity like wind direction", "A camera parameter"], "answer": "B", "explanation": "A scalar field assigns one number (scalar) per spatial point; visualised using isosurfaces, colour maps, or volume rendering."}, {"q": "An isosurface is:", "opts": ["A surface texture applied to terrain", "A surface in a scalar field where all points have the same scalar value", "A level-of-detail mesh", "A clipping plane for the view frustum"], "answer": "B", "explanation": "An isosurface connects all points in the scalar field with a given value (like a contour line in 2D but in 3D); e.g., a specific density value in a CT scan."}, {"q": "The Marching Cubes algorithm is used to:", "opts": ["Render shadow volumes", "Extract isosurface meshes from volumetric scalar data by processing one cube of 8 voxels at a time", "Compute fluid simulation", "Generate terrain heightmaps"], "answer": "B", "explanation": "Marching Cubes marches through a 3D grid, classifying each cube's 8 corners as inside/outside the isosurface value, and generates triangles at the boundary."}, {"q": "Volume rendering (direct volume rendering) differs from isosurface rendering in that:", "opts": ["Volume rendering requires a triangle mesh", "Volume rendering maps scalar values to colour and opacity, showing the full volume without extracting a surface", "Volume rendering is faster", "Volume rendering only works for 2D data"], "answer": "B", "explanation": "Direct volume rendering assigns transfer functions (colour + opacity per density value) and composites along viewing rays through the volume — no geometry extraction."}, {"q": "A transfer function in volume rendering maps:", "opts": ["World space coordinates to UV coordinates", "Scalar density values to colour and opacity (RGBA) for visualising different materials in the volume", "Screen coordinates to depth values", "Vertex positions to screen space"], "answer": "B", "explanation": "Transfer functions define how each scalar value should be coloured and how transparent/opaque it should appear — the key creative/scientific tool in volume rendering."}, {"q": "What is a \"vector field\" visualisation challenge compared to scalar fields?", "opts": ["Vector fields have no spatial component", "Vectors have both magnitude and direction — must visualise two quantities simultaneously; common techniques include arrow glyphs and streamlines", "Vector fields cannot be rendered in real time", "Vector fields are always 2D"], "answer": "B", "explanation": "Vectors have direction (e.g., wind direction) and magnitude (speed); visualising both requires careful design (arrow glyphs, colour for magnitude, streamlines for flow)."}, {"q": "Streamlines in flow visualisation are:", "opts": ["Lines connecting vertices in a mesh", "Curves that are everywhere tangent to the vector field, showing flow direction through the field", "Shadow edges on a terrain", "Scan lines used in rasterisation"], "answer": "B", "explanation": "Streamlines follow the vector field direction at each point, tracing the path a massless particle would take in the flow."}, {"q": "A medical CT scan produces a 3D volume of density values. A radiologist wants to see the bone structure. Which approach is most appropriate?", "opts": ["Render the mesh as a coloured point cloud", "Set a transfer function that makes bone-density values opaque and soft tissue transparent, then use volume rendering", "Render every voxel as a cube", "Apply a Phong shader to every voxel"], "answer": "B", "explanation": "Transfer functions selectively make bones visible (high-density → opaque) while soft tissue is semi-transparent, allowing the radiologist to see through the body to the skeleton."}, {"q": "Why is colour map choice important in scalar field visualisation?", "opts": ["Some colour maps are faster to compute", "Poorly chosen colour maps (e.g., rainbow) can introduce false perceptual boundaries and hide or exaggerate features in the data", "Colour maps affect rendering performance", "Colour maps define the isosurface threshold"], "answer": "B", "explanation": "The rainbow colour map creates perceptual discontinuities (false edges) and is non-monotonic in luminance; perceptually uniform maps (viridis, plasma) better represent data variations."}], "lqs": [{"id": "Q1", "q": "Compare isosurface rendering (Marching Cubes) and direct volume rendering. Describe the workflow of each, and explain when a scientist would choose one over the other.", "bullets": ["**Isosurface (Marching Cubes)**: select a threshold value; march through the 3D grid; for each cube of 8 voxels, classify corners as inside/outside; look up the 256 possible edge intersection patterns; generate triangles at the boundary. Outputs a standard triangle mesh.", "Choose when: a clear surface boundary exists (bone in CT, protein structure), standard mesh tools are needed, or hard-edged geometry is desired.", "**Direct volume rendering**: define a transfer function mapping density → RGBA; cast rays through the volume; at each step, sample density, apply transfer function, composite opacity and colour.", "Choose when: soft transitions matter (showing muscle AND bone simultaneously), exploratory analysis (easy to change what's visible by adjusting transfer function), or displaying fuzzy/graded phenomena like clouds or smoke.", "Key trade-off: isosurfaces give crisp geometry; volume rendering gives fuller context but is harder to set up and more expensive."]}, {"id": "Q2", "q": "A meteorologist wants to visualise a 3D wind field (velocity vectors at every grid point) over Europe. Describe two visualisation techniques that show flow direction and magnitude, and the strengths and weaknesses of each.", "bullets": ["**Arrow/glyph glyphs**: place arrows at sample points with direction matching the vector and length (or colour) encoding magnitude.", "Strength: immediately shows local direction and speed; intuitive; works at any density.", "Weakness: dense placement creates visual clutter; hard to trace flow paths.", "**Streamlines**: integrate paths tangent to the vector field from seed points; colour-code by speed.", "Strength: shows global flow structure and paths; reveals vortices and fronts.", "Weakness: choice of seed points affects what is shown; static (don't show unsteady flow).", "**Animated particles (pathlines)**: release particles and animate them over time following the time-varying field.", "Strength: intuitive temporal understanding; shows dynamic features like storms.", "Weakness: more complex to implement; works only for time-varying data."]}, {"id": "Q3", "q": "A volume dataset has 256×256×256 voxels with values in [0,1]. Isosurface extraction at value 0.5 is needed. Estimate the number of cubes processed by Marching Cubes, and explain what the 256 lookup table entries represent.", "bullets": ["Grid of voxels: 256×256×256 = **16,777,216 voxels**.", "Cubes (cells between voxels): 255×255×255 = **16,581,375 cubes**.", "Each cube has 8 corners; each corner is classified as 0 (below 0.5) or 1 (above 0.5) → 2⁸ = **256 possible configurations**.", "The 256 lookup table entries: each entry describes which edges of the cube are intersected by the isosurface (0–12 edges per cube) and which triangle configurations to generate at those intersections.", "By symmetry (reflections/rotations), the 256 cases reduce to ~15 fundamentally distinct patterns.", "For each cube, look up the configuration, interpolate edge intersection positions, and output 0–5 triangles."]}]}, {"id": "L19", "title": "Computer Animation (Ch16)", "mcqs": [{"q": "In computer animation, what is \"key-framing\"?", "opts": ["Locking certain bones in a skeleton rig", "The process where an animator provides data at key moments and the computer interpolates between them", "Recording real motion using sensors", "Applying physics simulation to every frame"], "answer": "B", "explanation": "Key-framing stores the scene state at important (key) frames; the computer fills in intermediate frames via interpolation."}, {"q": "What is the difference between \"straight-ahead\" and \"pose-to-pose\" animation?", "opts": ["They are identical techniques", "Straight-ahead draws every frame sequentially; pose-to-pose plans key frames first, then fills in between", "Straight-ahead is for digital animation; pose-to-pose for hand-drawn", "Pose-to-pose requires motion capture"], "answer": "B", "explanation": "Straight-ahead: animate frame by frame in sequence (good for fluid motion). Pose-to-pose: set key poses first, then fill in-betweens (better for planned, structured animation)."}, {"q": "\"Squash and stretch\" is a principle of animation that:", "opts": ["Uniformly scales objects", "Exaggerates deformation to emphasise weight, elasticity, and impact of motion", "Rotates characters around their centre of mass", "Reduces polygon count for distant objects"], "answer": "B", "explanation": "Squash (compression on impact) and stretch (elongation in motion direction) makes animation feel alive and communicates material properties like bounciness."}, {"q": "Forward Kinematics (FK) in skeletal animation means:", "opts": ["The end-effector position is specified and joint angles are computed", "Joint angles/rotations are specified from root to leaf; world positions are computed by multiplying down the hierarchy", "Physics drives all joint rotations", "Keyframes are automatically generated"], "answer": "B", "explanation": "FK: animator sets each joint's local rotation; world positions are computed by multiplying parent transforms down the hierarchy chain."}, {"q": "Inverse Kinematics (IK) is useful because:", "opts": ["It is faster than FK", "The animator specifies the desired end-effector position and the system solves for joint angles automatically", "It avoids gimbal lock", "It only works for rigid bodies"], "answer": "B", "explanation": "IK: specify where the hand/foot should be → solver computes joint angles to reach that position. Natural for character foot placement on uneven terrain."}, {"q": "Rigid skinning attaches a skin vertex to:", "opts": ["All joints with weighted influence", "A single fixed joint; the vertex moves exactly with that joint", "The mesh bounding box", "An interpolated position between two joints"], "answer": "B", "explanation": "Rigid skinning assigns each vertex to one joint — simple but causes \"candy-wrapper\" artefacts at joint bends where skin tears apart."}, {"q": "Smooth skinning uses the formula d = Σωᵢdᵢ. What does this compute?", "opts": ["The total joint rotation", "The blended vertex displacement as a weighted sum of displacement vectors from multiple influencing joints", "The average bone position", "The interpolation between key frames"], "answer": "B", "explanation": "Smooth skinning: each vertex is influenced by multiple joints with weights ωᵢ summing to 1; the displacement is a weighted blend, producing smooth bending at joints."}, {"q": "What is \"anticipation\" in the 12 principles of animation?", "opts": ["Making the character react after an action", "A preparatory motion before the main action, signalling to the viewer what is about to happen", "Slowing down the animation near key poses", "Looping an animation cycle"], "answer": "B", "explanation": "Anticipation: the character prepares for an action (winding back before throwing a punch) — makes actions feel intentional and gives the viewer time to follow."}, {"q": "Procedural animation generates motion using:", "opts": ["Hand-crafted key frames for every frame", "Mathematical functions or simulations to automatically generate motion (e.g., a wave function for water)", "Motion capture data from actors", "Pre-rendered video sequences"], "answer": "B", "explanation": "Procedural animation uses equations/algorithms (wave functions, noise, physics solvers) to generate motion, avoiding manual key framing."}, {"q": "A character's arm needs to reach for a door handle on uneven terrain. Which animation technique automatically solves the joint angles for the shoulder-elbow-wrist chain to reach the handle?", "opts": ["Forward Kinematics", "Blend shapes / Morph targets", "Inverse Kinematics", "Keyframe interpolation"], "answer": "C", "explanation": "IK: specify the target position of the hand (end-effector at the handle); the IK solver computes the shoulder/elbow/wrist rotations to reach it."}], "lqs": [{"id": "Q1", "q": "Compare Forward Kinematics (FK) and Inverse Kinematics (IK). Describe how each works algorithmically and give a practical example where each is the better choice.", "bullets": ["**FK**: animator specifies local rotation for each joint from root downward; world position = accumulated product of parent transforms × local transform (DFS down hierarchy).", "Example: a waving arm gesture where the artist wants precise control over shoulder sway and elbow bend — FK gives full artistic control.", "**IK**: animator specifies the desired world position of the end-effector; a solver (e.g., FABRIK, Jacobian inverse) computes joint angles to reach that target.", "Example: a character walking on stairs — the feet must precisely contact each step; IK automatically adjusts hip-knee-ankle to place the foot correctly regardless of terrain.", "FK is easier to implement but tedious for constrained tasks. IK is powerful for goal-directed motion but can have multiple solutions (ambiguity) requiring additional constraints."]}, {"id": "Q2", "q": "A cartoon bouncing ball needs to convey weight and elasticity. Describe how three animation principles from Lasseter's 12 principles apply to this motion.", "bullets": ["**Squash and stretch**: as the ball hits the floor, squash it (compress vertically, spread horizontally); as it rises, stretch it (elongate in motion direction). A heavier ball squashes more; a rubber ball stretches more.", "**Anticipation**: before a large bounce, slightly compress the ball before impact to signal the energy of the bounce.", "**Slow-in and slow-out**: the ball decelerates as it reaches peak height (slow-out near apex) and accelerates as gravity pulls it down (slow-in near ground) — matching physics and making the motion feel natural.", "**Timing**: the speed of the animation (frames between poses) communicates weight; a heavy ball falls fast and barely bounces; a light ball has slower, higher bounces."]}, {"id": "Q3", "q": "A smooth-skinned character has vertex V influenced by two joints: J1 with weight ω1=0.7 producing displacement d1=(2,0,0), and J2 with weight ω2=0.3 producing displacement d2=(0,3,0). Using d = Σωᵢdᵢ, compute the final displacement of vertex V.", "bullets": ["d = ω1×d1 + ω2×d2", "d = 0.7×(2,0,0) + 0.3×(0,3,0)", "d = (1.4, 0, 0) + (0, 0.9, 0)", "**d = (1.4, 0.9, 0)**", "Check weights: ω1 + ω2 = 0.7 + 0.3 = 1.0 ✓ (weights must sum to 1 for correct blending).", "The vertex moves more in the X direction (dominated by J1's 0.7 weight) and partially in Y (from J2).", "If only rigid skinning to J1 were used: d = (2,0,0). Smooth skinning produces a more natural blend between joint influences."]}]}, {"id": "L20", "title": "Visual Perception (Ch19)", "mcqs": [{"q": "Weber's Law states that the just-noticeable difference (JND) in stimulus intensity is:", "opts": ["Constant regardless of the base intensity", "Proportional to the base stimulus intensity: ΔI/I = constant", "Inversely proportional to the base intensity", "Equal to the square root of the intensity"], "answer": "B", "explanation": "Weber's Law: ΔI = k×I; the threshold for detecting a change is a constant fraction of the current stimulus level (e.g., you notice 1% brightness change regardless of absolute brightness)."}, {"q": "The human visual system has approximately how many types of cone cells, and what do they detect?", "opts": ["Two types: bright and dim", "Three types: sensitive to short (blue), medium (green), and long (red) wavelengths", "Four types: RGBY", "One type — cones detect all colours equally"], "answer": "B", "explanation": "The retina has three cone types (S, M, L) tuned to short (blue ~420nm), medium (green ~530nm), and long (red ~560nm) wavelengths — the basis of trichromatic colour vision."}, {"q": "\"Colour constancy\" refers to:", "opts": ["Using a fixed colour palette in art", "The perceptual ability to perceive an object's colour as approximately constant despite changes in illumination", "Ensuring monitors display identical colours", "Keeping RGB values within [0,1]"], "answer": "B", "explanation": "Colour constancy: a red apple appears red both in sunlight and fluorescent light — the visual system compensates for the illuminant's spectral power."}, {"q": "Which monocular depth cue involves closer objects appearing larger on the retina?", "opts": ["Stereopsis", "Motion parallax", "Relative size", "Convergence"], "answer": "C", "explanation": "Relative size: familiar objects that appear smaller are judged as further away. This is a powerful monocular depth cue used in perspective drawing."}, {"q": "What is \"contrast sensitivity\"?", "opts": ["The maximum brightness a display can produce", "The ability of the visual system to detect differences in luminance between adjacent regions; varies with spatial frequency", "The colour accuracy of a monitor", "The rate at which images can be perceived (fps)"], "answer": "B", "explanation": "Contrast sensitivity: how small a luminance difference can be detected. It peaks at mid spatial frequencies (~3–5 cycles/degree) and falls at high frequencies (fine detail threshold)."}, {"q": "Motion blur in computer graphics simulates:", "opts": ["The GPU's rendering speed limitation", "The eye's retinal persistence that smears fast-moving objects across adjacent frames", "Depth of field blur for unfocused objects", "Anti-aliasing of geometric edges"], "answer": "B", "explanation": "Motion blur arises because the eye and film/sensor integrate light over time; fast-moving objects leave a smear. CG motion blur simulates this for more natural-looking animation."}, {"q": "Stereopsis (binocular depth perception) requires:", "opts": ["Only one eye", "Two horizontally separated viewpoints (as in the two human eyes), creating horizontal disparity between left and right retinal images", "High display refresh rate", "A fisheye lens"], "answer": "B", "explanation": "Stereopsis uses the horizontal offset between the left and right eyes to compute depth from the disparity between corresponding points in each eye's image."}, {"q": "The \"Mach band\" effect illustrates that:", "opts": ["The visual system accurately represents all luminance differences", "The visual system enhances perceived contrast at luminance boundaries — edges appear sharper than the actual luminance gradient", "The eye cannot perceive colour differences", "Screen resolution determines perceived sharpness"], "answer": "B", "explanation": "Mach bands: lateral inhibition in the retina exaggerates luminance edges; light bands appear lighter and dark bands appear darker near the boundary than they actually are."}, {"q": "Why does depth of field (DOF) blur in CG improve realism?", "opts": ["It reduces polygon count", "It matches the human eye's (and physical camera's) behaviour of blurring objects outside the focal plane, providing a strong depth cue", "It reduces rendering time", "It eliminates aliasing"], "answer": "B", "explanation": "DOF blur is a natural physical property of lenses and the eye; CG scenes without DOF look flat and \"computer-generated.\" Adding DOF provides a strong depth cue."}, {"q": "The visual system is more sensitive to changes in which property at low light levels?", "opts": ["Colour hue", "Luminance/brightness (detected by rod cells, which are achromatic)", "Saturation", "Texture detail"], "answer": "B", "explanation": "Rods (used in low-light/scotopic vision) are more numerous and sensitive to luminance but cannot detect colour; hence poor colour discrimination in dark conditions."}], "lqs": [{"id": "Q1", "q": "Explain how the Contrast Sensitivity Function (CSF) should inform decisions in computer graphics rendering, texture design, and display calibration.", "bullets": ["CSF shows human sensitivity peaks at ~3–5 cycles/degree of visual angle and drops at very high frequencies (fine detail beyond ~30 cycles/degree is invisible) and very low frequencies.", "**Texture design**: no need for detail finer than the CSF's high-frequency cutoff at the expected viewing distance — saves texture resolution and GPU bandwidth.", "**Rendering**: anti-aliasing at frequencies beyond the CSF cutoff is wasted computation; MSAA can use fewer samples for fine geometry aliasing that the eye cannot resolve.", "**Compression**: JPEG exploits CSF by discarding high-frequency components that the eye is less sensitive to (more compression in fine detail).", "**Display calibration**: gamma correction aligns with the non-linear luminance response of the visual system; a perceptually uniform ramp requires gamma ≈ 2.2.", "**LOD**: the CSF justifies switching to lower-detail meshes/textures at sufficient distance."]}, {"id": "Q2", "q": "A VR experience wants to be convincing. Describe four visual perception phenomena that the VR system must correctly simulate to maximise immersion and depth perception.", "bullets": ["**Stereopsis**: the two displays must show images from the correct left/right eye positions with proper horizontal disparity — the most powerful depth cue in VR.", "**Motion parallax**: as the user moves their head, the scene must update correctly at low latency (<20ms) — objects close by shift more than distant ones. High latency causes nausea (vestibular-visual conflict).", "**Vergence-accommodation conflict**: in real life, eyes converge AND accommodate (focus) to the same depth; VR screens are at fixed distance, causing conflict — the most common cause of discomfort.", "**Depth of field**: blurring objects not at the fixation depth matches natural vision and provides a depth cue; gaze-contingent DOF improves realism.", "**Colour constancy**: consistent illumination across the scene prevents wrong colour percepts."]}, {"id": "Q3", "q": "Weber's Law states ΔI/I = k where k ≈ 0.02 for luminance. A surface has luminance I = 100 cd/m². What is the smallest luminance change ΔI the eye can detect? If the luminance increases to 500 cd/m², what is the new ΔI?", "bullets": ["At I = 100 cd/m²: ΔI = k × I = 0.02 × 100 = **2 cd/m²**. Any change smaller than 2 cd/m² is imperceptible.", "At I = 500 cd/m²: ΔI = 0.02 × 500 = **10 cd/m²**. The detection threshold increases proportionally.", "Implication for CG: at high luminance (bright sunlight), larger intensity differences are needed to create perceivable contrast — validates using HDR for bright scenes.", "Implication for quantisation: 8-bit (256 levels) is perceptually adequate because Weber's Law means we need the same *relative* precision, not absolute; equal steps in linear luminance are more than sufficient."]}]}, {"id": "L21", "title": "Physics-Based Rendering (Ch14)", "mcqs": [{"q": "The rendering equation describes:", "opts": ["How to transform vertices through the pipeline", "The equilibrium of light energy at a surface: outgoing radiance equals emitted radiance plus reflected radiance integrated over the hemisphere", "The equations for rigid body physics simulation", "The formula for shadow map depth comparison"], "answer": "B", "explanation": "The rendering equation (Kajiya 1986) is L_o(x,ω_o) = L_e(x,ω_o) + ∫ f_r(x,ω_i,ω_o) L_i(x,ω_i) (ω_i·n) dω_i — the foundational equation for physically-based rendering."}, {"q": "A BRDF (Bidirectional Reflectance Distribution Function) describes:", "opts": ["The depth of shadows on a surface", "The ratio of reflected radiance in a given outgoing direction to the incident irradiance from a given incoming direction", "How light refracts through transparent materials", "The speed of light in a medium"], "answer": "B", "explanation": "The BRDF f_r(ω_i, ω_o) defines how much light arriving from direction ω_i is reflected toward direction ω_o — the core of all PBR material models."}, {"q": "What does \"energy conservation\" mean for a physically-based BRDF?", "opts": ["The GPU uses less power", "The total reflected light cannot exceed the total incident light — a surface cannot reflect more light than it receives", "Light energy is converted to heat in the shader", "Specular and diffuse must sum to exactly 1.0"], "answer": "B", "explanation": "A physically valid BRDF must be energy-conserving: ∫ f_r(ω_i,ω_o) cos(θ_i) dω_i ≤ 1 for all ω_o."}, {"q": "Radiometry is the science of:", "opts": ["Measuring electromagnetic radiation emitted by radio transmitters", "Measuring the physical quantities of electromagnetic radiation (energy, power, radiance, irradiance) in absolute units", "Rendering radio-wave phenomena", "Measuring the refresh rate of displays"], "answer": "B", "explanation": "Radiometry provides the physical foundation for PBR: quantities like radiant flux (W), irradiance (W/m²), and radiance (W/m²/sr) describe light transport precisely."}, {"q": "The Fresnel effect describes:", "opts": ["Light scattering inside a material", "The change in reflectance with the angle of incidence — surfaces reflect more at grazing angles", "Light absorption in coloured materials", "The blurring of reflections on rough surfaces"], "answer": "B", "explanation": "Fresnel equations describe how the fraction of light reflected vs transmitted changes with the angle of incidence; at grazing angles (~90°), most surfaces become mirror-like."}, {"q": "The Schlick approximation for Fresnel reflectance is:", "opts": ["R(θ) = R₀ + (1−R₀)(1−cosθ)⁵ where R₀ = ((n−1)/(n+1))²", "R(θ) = sinθ/cosθ", "R(θ) = R₀ × cosθ", "R(θ) = 1 − (n−1)/(n+1)"], "answer": "A", "explanation": "Schlick's approximation is a fast, accurate approximation to the full Fresnel equations, widely used in real-time PBR shaders."}, {"q": "What is the \"microfacet model\" in PBR?", "opts": ["A model that approximates curved surfaces with small flat triangles", "A surface model that treats a surface as covered with tiny mirror facets at the microscale; the distribution of these facets' orientations controls roughness", "A model for rendering cloth at the fibre level", "A GPU rendering model for mipmaps"], "answer": "B", "explanation": "Microfacet theory: real surfaces are microscopically rough; each facet is a perfect mirror; the distribution of facet normals (GGX, Beckmann) determines material roughness and specular shape."}, {"q": "In PBR, the \"roughness\" parameter controls:", "opts": ["The bump map intensity", "The width of the specular highlight — low roughness = tight sharp specular; high roughness = broad diffuse-looking specular", "The amount of ambient occlusion", "The texture resolution"], "answer": "B", "explanation": "Roughness in microfacet PBR modulates the normal distribution function (NDF); low roughness = aligned facets → sharp specular; high roughness = varied facets → broad/diffuse specular."}, {"q": "Global illumination (GI) refers to:", "opts": ["Only direct lighting from light sources", "The full simulation of inter-object light transport including indirect bounces (light from one surface illuminating another)", "A post-process bloom effect", "The ambient light term in the Phong model"], "answer": "B", "explanation": "GI encompasses all indirect light effects: diffuse interreflection, caustics, colour bleeding, and area soft shadows — everything beyond direct illumination."}, {"q": "Path tracing is a Monte Carlo method for solving the rendering equation. Its main disadvantage is:", "opts": ["It cannot simulate indirect lighting", "It requires many samples per pixel to converge to a noise-free result — computationally very expensive", "It only works for diffuse materials", "It cannot handle specular reflections"], "answer": "B", "explanation": "Path tracing is unbiased and physically accurate but converges slowly; noise (fireflies) requires hundreds to thousands of samples per pixel for clean results."}], "lqs": [{"id": "Q1", "q": "Explain the rendering equation. Identify each term and explain what physical phenomenon it represents. Why is it difficult to solve in practice?", "bullets": ["L_o(x, ω_o) = L_e(x, ω_o) + ∫_Ω f_r(x, ω_i, ω_o) L_i(x, ω_i) (n̂·ω_i) dω_i", "**L_o**: outgoing radiance at point x in direction ω_o — what the camera \"sees.\"", "**L_e**: emitted radiance — light emitted by the surface itself (e.g., a lamp).", "**f_r**: BRDF — describes how the surface reflects light.", "**L_i**: incoming radiance from direction ω_i — includes all light reaching x (direct + indirect).", "**n̂·ω_i**: Lambert cosine factor — surface orientation relative to incoming light.", "**The integral**: sum over the hemisphere of all incoming directions ω_i.", "Why hard to solve: L_i itself contains the rendering equation recursively (indirect light = other surfaces' L_o); the integral over an infinite hemisphere has no closed form; Monte Carlo methods (path tracing) approximate it stochastically."]}, {"id": "Q2", "q": "Explain how the Fresnel effect makes water look different when viewed from directly above versus at a shallow angle. Describe how Schlick's approximation is used in a PBR shader to implement this.", "bullets": ["Water has refractive index n ≈ 1.33. At normal incidence (looking straight down): R₀ = ((1.33−1)/(1.33+1))² = (0.33/2.33)² ≈ 0.02 — only 2% of light reflects; 98% refracts/transmits through. Water appears transparent.", "At grazing incidence (looking along the surface): the Fresnel equations give R → 1.0 — nearly all light reflects. Water becomes mirror-like, reflecting the sky.", "Schlick approximation in GLSL:", "At low angles (cosTheta → 0): F → 1 → see sky reflection. Overhead (cosTheta → 1): F → 0.02 → see through water."]}, {"id": "Q3", "q": "A PBR material has R₀ = 0.04 (non-metal, like plastic). Using Schlick's approximation R(θ) = R₀ + (1−R₀)(1−cosθ)⁵, calculate the Fresnel reflectance at θ = 0° (normal incidence), θ = 60°, and θ = 90° (grazing). Interpret the results.", "bullets": ["**θ = 0°** (normal incidence): cosθ = 1. R = 0.04 + 0.96×(1−1)⁵ = 0.04 + 0 = **0.04 (4%)**. Most light passes through; small specular highlight.", "**θ = 60°**: cosθ = 0.5. R = 0.04 + 0.96×(0.5)⁵ = 0.04 + 0.96×0.03125 = 0.04 + 0.03 = **0.07 (7%)**. Slightly more reflective.", "**θ = 90°** (grazing): cosθ = 0. R = 0.04 + 0.96×(1)⁵ = 0.04 + 0.96 = **1.0 (100%)**. Perfect mirror at grazing angle.", "Interpretation: even a matte plastic surface becomes mirror-like at grazing angles — this is why floors appear reflective when you look across them at a shallow angle, and why PBR materials without Fresnel look flat and fake."]}]}];

let currentMode = "mcq";
let answers = {};
let revealed = {};

const sel = document.getElementById("lecture-select");
DATA.forEach(function(lec) {
  const opt = document.createElement("option");
  opt.value = lec.id;
  opt.textContent = lec.id + " — " + lec.title;
  sel.appendChild(opt);
});
sel.addEventListener("change", render);

function setMode(m) {
  currentMode = m;
  ["mcq","lq","both"].forEach(function(x) {
    document.getElementById("mode-"+x).classList.toggle("active", x===m);
  });
  render();
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function renderMCQ(mcq, key) {
  const ans = answers[key];
  const isLocked = ans !== undefined;
  const isRevealed = revealed[key];
  const letters = ["A","B","C","D"];

  let opts = "";
  mcq.opts.forEach(function(opt, oi) {
    const letter = letters[oi];
    let cls = "mcq-opt";
    if (isLocked || isRevealed) {
      cls += " locked";
      if (letter === mcq.answer) cls += " correct";
      else if (ans && ans.chosen === letter) cls += " wrong";
    }
    // Use data attributes to avoid quote-in-string issues
    opts += '<li class="' + cls + '" data-key="' + escHtml(key) + '" data-oi="' + oi + '" data-ans="' + escHtml(mcq.answer) + '" onclick="handlePick(this)">'
          + '<span class="opt-letter">' + letter + '</span><span>' + escHtml(opt) + '</span></li>';
  });

  let feedback = "";
  if (isLocked || isRevealed) {
    const correct = ans ? ans.chosen === mcq.answer : true;
    const cls2 = (isRevealed && !ans) ? "fb-correct" : (correct ? "fb-correct" : "fb-wrong");
    const msg = (!isRevealed || ans)
      ? ((correct ? "&#10003; Correct! " : "&#10007; Answer is " + mcq.answer + ". ") + escHtml(mcq.explanation))
      : ("&rarr; Answer: <strong>" + mcq.answer + "</strong>. " + escHtml(mcq.explanation));
    feedback = '<div class="mcq-feedback show ' + cls2 + '">' + msg + "</div>";
  }

  return '<div class="mcq-block" id="mcq-' + escHtml(key) + '">'
       + '<div class="mcq-num">Question ' + (parseInt(key.split("-")[1])+1) + ' of 10</div>'
       + '<div class="mcq-q">' + escHtml(mcq.q) + "</div>"
       + '<ul class="mcq-opts">' + opts + "</ul>"
       + feedback
       + "</div>";
}

function handlePick(el) {
  const key = el.dataset.key;
  const oi  = parseInt(el.dataset.oi);
  const correctAnswer = el.dataset.ans;
  if (answers[key] !== undefined || revealed[key]) return;
  const letters = ["A","B","C","D"];
  answers[key] = { chosen: letters[oi], correct: letters[oi] === correctAnswer };
  const lec = DATA.find(function(l) { return key.startsWith(l.id + "-") && key.indexOf("lq") === -1; });
  if (!lec) return;
  const qi = parseInt(key.split("-")[1]);
  const el2 = document.getElementById("mcq-" + key);
  if (el2) el2.outerHTML = renderMCQ(lec.mcqs[qi], key);
  updateScore();
}

function renderLQ(lq, key) {
  const isShown = revealed["show-" + key];
  let bullets = "";
  if (lq.bullets && lq.bullets.length) {
    lq.bullets.forEach(function(b) { bullets += "<li>" + escHtml(b) + "</li>"; });
    bullets = "<h4>Model Answer</h4><ul>" + bullets + "</ul>";
  }
  return '<div class="lq-block">'
       + '<div class="lq-header' + (isShown ? " open" : "") + '" data-lqkey="' + escHtml(key) + '" onclick="handleToggleLQ(this)">'
       + '<div><div class="lq-title">' + escHtml(lq.id) + ". " + escHtml(lq.q) + "</div>"
       + '<div class="lq-meta">Long question &middot; Click to expand model answer</div></div>'
       + '<span class="lq-chevron">&#9658;</span></div>'
       + '<div class="lq-body' + (isShown ? " open" : "") + '" id="lqb-' + escHtml(key) + '">' + bullets + "</div>"
       + "</div>";
}

function handleToggleLQ(hdr) {
  const key = hdr.dataset.lqkey;
  const body = document.getElementById("lqb-" + key);
  if (!body) return;
  const open = body.classList.toggle("open");
  hdr.classList.toggle("open", open);
  revealed["show-" + key] = open;
}

function render() {
  const filter = sel.value;
  const lecs = filter === "all" ? DATA : DATA.filter(function(l) { return l.id === filter; });
  let html = "";
  lecs.forEach(function(lec) {
    html += '<div class="lec-block" id="lec-' + lec.id + '">';
    html += '<h2 style="border-color:var(--accent)">' + escHtml(lec.id) + " &mdash; " + escHtml(lec.title) + "</h2>";
    if (currentMode === "mcq" || currentMode === "both") {
      html += '<h3 style="color:var(--accent)">Multiple Choice Questions</h3><div class="mcq-section">';
      lec.mcqs.forEach(function(mcq, qi) {
        html += renderMCQ(mcq, lec.id + "-" + qi);
      });
      html += "</div>";
    }
    if (currentMode === "lq" || currentMode === "both") {
      html += '<h3 style="color:var(--accent2)">Long Questions</h3>';
      lec.lqs.forEach(function(lq, qi) {
        html += renderLQ(lq, lec.id + "-lq-" + qi);
      });
    }
    html += "</div>";
  });
  document.getElementById("content-area").innerHTML = html;
  updateScore();
}

function updateScore() {
  const filter = sel.value;
  const lecs = filter === "all" ? DATA : DATA.filter(function(l) { return l.id === filter; });
  let total = 0, answered = 0, correct = 0;
  lecs.forEach(function(lec) {
    lec.mcqs.forEach(function(_, qi) {
      total++;
      const key = lec.id + "-" + qi;
      if (answers[key] !== undefined) { answered++; if (answers[key].correct) correct++; }
    });
  });
  document.getElementById("score-num").textContent = correct + "/" + answered;
  document.getElementById("progress-fill").style.width = (total > 0 ? (answered/total*100) : 0) + "%";
  document.getElementById("progress-text").textContent = answered + " of " + total + " MCQs answered &middot; " + correct + " correct";
}

function resetAll() {
  if (!confirm("Reset all answers?")) return;
  answers = {}; revealed = {};
  render();
}

function revealAll() {
  const filter = sel.value;
  const lecs = filter === "all" ? DATA : DATA.filter(function(l) { return l.id === filter; });
  lecs.forEach(function(lec) {
    lec.mcqs.forEach(function(_, qi) {
      const key = lec.id + "-" + qi;
      if (answers[key] === undefined) revealed[key] = true;
    });
  });
  render();
}

render();
</script>
</body>
</html>
